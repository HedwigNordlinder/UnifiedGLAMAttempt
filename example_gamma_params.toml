[run]
seed = 20260516
prefix = "example_gamma"
output_dir = "runs/example_gamma"
progress = true

[simulation]
regression = "gamma"
p = 100
npatients = 1000
nobs_range = [1,40]
cluster_mean_shift = 1.0

[latent_prior]
alpha0 = 2.0
beta0 = 2.0
lambda0_scale = 2.0
a0 = 2.0
b0 = 2.0
nu0_offset = 3.0
S0_scale = 1.0
m0 = 0.0

[beta_prior]
dist = "normal"
mean = 0.0
sd = 1.0

[t_prior]
dist = "uniform"
low = 0.0
high = 1.0

[gamma]
active_probability = 0.1

[allocation_mcmc]
nsweeps = 500
burn = 0
thin = 1
save_states = true
postprocess = true
progress = true
progress_every = 10

[fitting]
regression_data = "map"

[regression_mcmc]
model = "auto"
nsamples = 400
initial_hmc = 200
initial_adapts = 100
hmc_steps_per_gamma = 5
hmc_adapts_per_gamma = 4
reuse_initial_metric = true
step_size_adapt_rate = 0.02
init_gamma = "all_on"
init_t = 0.5
target_accept = 0.9
max_depth = 8
save_chain = true
save_states = false
progress = true
progress_every = 10
