[run]
seed = 20260516
prefix = "gamma_p400_npatients2000_nobs20-40_shift1p0_active0p3_alpha4p0_beta2p0"
output_dir = "runs/gamma_p400_npatients2000_nobs20-40_shift1p0_active0p3_alpha4p0_beta2p0"
progress = true

[simulation]
regression = "gamma"
p = 400
npatients = 2000
nobs_range = [20,40]
cluster_mean_shift = 1.0

[latent_prior]
alpha0 = 4.0
beta0 = 2.0
lambda0_scale = 2.0
a0 = 2.0
b0 = 2.0
nu0_offset = 3.0
S0_scale = 1.0
m0 = 0.0

[beta_prior]
dist = "normal"
mean = 0.0
sd = 1.0

[t_prior]
dist = "uniform"
low = 0.0
high = 1.0

[gamma]
active_probability = 0.3

[allocation_mcmc]
nsweeps = 500
burn = 0
thin = 1
save_states = true
postprocess = true
progress = true
progress_every = 10

[plotting]
burn_in = 0
allocation_burn_in = 50
regression_burn_in = 400

[fitting]
regression_data = "map"

[regression_mcmc]
model = "auto"
nsamples = 800
initial_hmc = 400
initial_adapts = 200
hmc_steps_per_gamma = 5
hmc_adapts_per_gamma = 0
reuse_initial_metric = true
step_size_adapt_rate = 0.02
init_gamma = "all_on"
init_t = 0.5
target_accept = 0.9
max_depth = 8
save_chain = true
save_states = false
progress = true
progress_every = 10
